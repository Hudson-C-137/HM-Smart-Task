<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#F2F2F7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Tarefas Pro">
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/4345/4345573.png">
    
    <title>Tarefas Diárias Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        appleBlue: '#007AFF',
                        appleRed: '#FF3B30',
                        appleGreen: '#34C759',
                        iosBg: '#F2F2F7',
                        iosGray: '#E5E5EA'
                    },
                    borderRadius: { 'ios': '12px', 'ios-lg': '20px' }
                }
            }
        }
    </script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        .slide-card { scroll-snap-align: start; flex-shrink: 0; transition: all 0.3s ease; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #taskSlider { scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        input[type="checkbox"].task-check {
            -webkit-appearance: none; appearance: none; background-color: #fff; margin: 0;
            width: 1.3em; height: 1.3em; border: 1px solid #C7C7CC; border-radius: 50%;
            display: grid; place-content: center; transition: 0.2s;
        }
        input[type="checkbox"].task-check:checked { background-color: var(--checked-color); border-color: var(--checked-color); }
        input[type="checkbox"].task-check:checked::after { content: "✓"; color: white; font-size: 0.8rem; font-weight: bold; }

        .progress-bar { height: 4px; border-radius: 2px; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

        .month-select {
            appearance: none; background: transparent; border: none; font-weight: 700; color: #007AFF; cursor: pointer; outline: none; font-size: 0.9rem;
            padding: 4px 8px;
        }
    </style>
</head>
<body class="bg-iosBg text-black antialiased">

    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/30 z-40 opacity-0 pointer-events-none transition-opacity"></div>

    <div id="sidebar" class="fixed top-0 left-0 h-full w-72 bg-white/95 backdrop-blur-xl z-50 p-6 transform -translate-x-full shadow-2xl rounded-r-ios-lg">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold tracking-tight">Opções</h2>
            <button onclick="toggleSidebar()" class="text-appleBlue font-semibold text-lg">OK</button>
        </div>
        
        <div class="space-y-4">
            <button id="installBtn" class="hidden w-full bg-appleBlue text-white p-4 rounded-ios font-bold shadow-md flex items-center justify-center gap-2 active:scale-95 transition">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Instalar App
            </button>

            <div class="bg-iosBg rounded-ios p-3 space-y-2">
                <h3 class="text-xs uppercase text-gray-400 font-bold ml-1">Sincronização</h3>
                <button onclick="exportBackup()" class="w-full text-left bg-white p-3 rounded-ios text-appleBlue font-medium shadow-sm">Exportar JSON</button>
                <label class="block w-full text-left bg-white p-3 rounded-ios text-appleBlue font-medium shadow-sm cursor-pointer text-center">
                    Importar JSON
                    <input type="file" id="importInput" class="hidden" onchange="importBackup(event)">
                </label>
            </div>

            <button onclick="resetFactory()" class="w-full text-appleRed p-4 rounded-ios font-bold bg-red-50">Restaurar de Fábrica</button>
        </div>
    </div>

    <div class="max-w-4xl mx-auto px-4 pb-24">
        <header class="py-6 flex justify-between items-end sticky top-0 bg-iosBg/90 backdrop-blur-md z-30">
            <div>
                <p id="currentMonthDisplay" class="text-appleRed text-sm font-bold uppercase tracking-widest"></p>
                <h1 id="currentDayNumDisplay" class="text-5xl font-black tracking-tighter"></h1>
            </div>
            
            <h2 id="currentDayNameDisplay" class="text-3xl font-black uppercase tracking-tight absolute left-1/2 -translate-x-1/2 bottom-7"></h2>

            <button onclick="toggleSidebar()" class="text-appleBlue p-3 bg-white rounded-full shadow-sm active:bg-gray-100 transition">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
        </header>

        <div class="mb-8 bg-white p-3 rounded-ios-lg shadow-sm">
            <div class="relative">
                <input type="date" id="dateSelector" class="w-full pl-10 pr-4 py-3 bg-iosBg rounded-ios font-semibold appearance-none outline-none">
                <svg class="absolute left-3 top-3.5 text-appleBlue" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            </div>
        </div>

        <h2 class="text-2xl font-bold mb-4 px-1 flex justify-between items-center">
            Suas Tarefas <span id="taskCount" class="text-sm font-normal text-gray-400 bg-white px-3 py-1 rounded-full shadow-inner">0</span>
        </h2>

        <div id="taskSlider" class="flex overflow-x-auto space-x-4 pb-6 no-scrollbar"></div>

        <button onclick="openDetailModal()" class="fixed bottom-8 left-6 bg-appleBlue text-white w-16 h-16 rounded-full shadow-2xl flex items-center justify-center z-40 active:scale-90 transition transform duration-200">
             <div class="flex flex-col gap-1.5 items-center justify-center">
                <div class="w-6 h-1 bg-white rounded-full"></div>
                <div class="w-6 h-1 bg-white rounded-full"></div>
                <div class="w-6 h-1 bg-white rounded-full"></div>
             </div>
        </button>

        <button onclick="openAddModal()" class="fixed bottom-8 right-6 bg-appleBlue text-white w-16 h-16 rounded-full shadow-2xl flex items-center justify-center z-40 active:scale-90 transition transform duration-200">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
    </div>

    <div id="addModal" class="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center hidden p-6 backdrop-blur-sm">
        <div class="bg-white rounded-ios-lg p-6 w-full max-sm shadow-2xl">
            <h3 class="text-xl font-bold mb-4">Nova Atividade</h3>
            <input type="text" id="newTaskTitle" placeholder="O que precisa ser feito?" class="w-full p-4 bg-iosBg rounded-ios mb-3 outline-none font-medium">
            <textarea id="newTaskItems" placeholder="Sub-tarefas (uma por linha)" class="w-full p-4 bg-iosBg rounded-ios mb-6 h-32 outline-none text-sm"></textarea>
            <div class="flex gap-4">
                <button onclick="closeAddModal()" class="flex-1 py-3 text-gray-400 font-bold">Cancelar</button>
                <button onclick="saveNewTask()" class="flex-1 bg-appleBlue text-white py-3 rounded-ios font-bold shadow-md">Criar</button>
            </div>
        </div>
    </div>

    <div id="detailModal" class="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center hidden p-4 backdrop-blur-sm">
        <div class="bg-white rounded-ios-lg w-full max-w-md max-h-[85vh] flex flex-col shadow-2xl overflow-hidden">
            <div class="p-6 border-b border-gray-100 bg-white">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-2xl font-bold">Lista Detalhada</h3>
                    <button onclick="closeDetailModal()" class="text-appleBlue font-bold text-lg">Pronto</button>
                </div>
                
                <div class="flex flex-col gap-3 bg-iosBg p-4 rounded-ios-lg">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 bg-appleRed rounded-lg shadow-sm flex flex-col items-center justify-center overflow-hidden border border-appleRed">
                            <div class="bg-white w-full text-[10px] text-center font-bold text-appleRed py-0.5 uppercase" id="calIconMonth">MAR</div>
                            <div class="text-white text-xl font-black leading-none" id="calIconYear">26</div>
                        </div>
                        <div class="flex-grow">
                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter">Navegar no Histórico</p>
                            <div class="flex items-center gap-2">
                                <select id="monthFilter" class="month-select" onchange="renderDetailList()">
                                    <option value="01">Janeiro</option><option value="02">Fevereiro</option>
                                    <option value="03">Março</option><option value="04">Abril</option>
                                    <option value="05">Maio</option><option value="06">Junho</option>
                                    <option value="07">Julho</option><option value="08">Agosto</option>
                                    <option value="09">Setembro</option><option value="10">Outubro</option>
                                    <option value="11">Novembro</option><option value="12">Dezembro</option>
                                </select>
                                <span class="text-gray-300">|</span>
                                <select id="yearFilter" class="month-select" onchange="renderDetailList()">
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div id="detailListContainer" class="flex-grow overflow-y-auto p-4 space-y-3 bg-iosBg/30">
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO PWA (MANIFESTO DINÂMICO) ---
        const manifest = {
            "name": "Tarefas Diárias Pro",
            "short_name": "Tarefas Pro",
            "start_url": "./",
            "display": "standalone",
            "background_color": "#F2F2F7",
            "theme_color": "#007AFF",
            "icons": [{
                "src": "https://cdn-icons-png.flaticon.com/512/4345/4345573.png",
                "sizes": "512x512",
                "type": "image/png",
                "purpose": "any maskable"
            }]
        };
        const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(manifestBlob);
        const manifestTag = document.createElement('link');
        manifestTag.rel = 'manifest';
        manifestTag.href = manifestURL;
        document.head.appendChild(manifestTag);

        // --- LÓGICA DE INSTALAÇÃO ---
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.classList.remove('hidden'); // Mostra o botão se puder instalar
        });

        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                installBtn.classList.add('hidden');
            }
            deferredPrompt = null;
        });

        // --- SERVICE WORKER ---
        const CACHE_NAME = 'tarefas-pro-v12';
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = '${CACHE_NAME}';
                const ASSETS = ['./', window.location.href, 'https://cdn.tailwindcss.com'];
                self.addEventListener('install', e => { 
                    e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(ASSETS))); 
                    self.skipWaiting(); 
                });
                self.addEventListener('activate', e => {
                    e.waitUntil(caches.keys().then(ks => Promise.all(ks.map(k => k !== CACHE_NAME && caches.delete(k)))));
                });
                self.addEventListener('fetch', e => {
                    e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
                });
            `;
            const swBlob = new Blob([swCode], {type: 'text/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(swBlob));
        }

        // --- APP LOGIC ---
        let db = JSON.parse(localStorage.getItem('taskDB_v3')) || { tasks: [] };

        function save() {
            localStorage.setItem('taskDB_v3', JSON.stringify(db));
            renderTasks(document.getElementById('dateSelector').value);
        }

        function renderTasks(date) {
            const container = document.getElementById('taskSlider');
            const filtered = db.tasks.filter(t => t.date === date);
            document.getElementById('taskCount').innerText = filtered.length;
            container.innerHTML = '';

            if(filtered.length === 0) {
                container.innerHTML = `<div class="w-full bg-white/40 border-2 border-dashed border-gray-300 rounded-ios-lg p-16 text-center text-gray-400">Nenhum plano para este dia.</div>`;
                return;
            }

            filtered.forEach(task => {
                const doneCount = task.items.filter(i => i.done).length;
                const percent = (doneCount / task.items.length) * 100;
                const isAllDone = percent === 100;
                const color = isAllDone ? 'appleGreen' : 'appleRed';

                const card = document.createElement('div');
                card.className = `slide-card w-[88%] md:w-80 bg-white p-5 rounded-ios-lg shadow-lg border-t-8 border-${color} flex flex-col relative`;
                card.innerHTML = `
                    <div class="absolute top-0 left-0 w-full bg-gray-100 h-1 overflow-hidden"><div class="progress-bar bg-${color}" style="width: ${percent}%"></div></div>
                    <div class="flex-grow pt-2" style="--checked-color: ${isAllDone ? '#34C759' : '#FF3B30'}">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="font-black text-xl leading-tight text-gray-900">${task.title}</h3>
                            <button onclick="deleteTask(${task.id})" class="text-gray-300 hover:text-appleRed transition">✕</button>
                        </div>
                        <ul class="space-y-4 mb-6">
                            ${task.items.map((item, idx) => `
                                <li class="flex items-center gap-3">
                                    <input type="checkbox" class="task-check" ${item.done ? 'checked' : ''} onchange="toggleItem(${task.id}, ${idx})">
                                    <span class="text-base ${item.done ? 'line-through text-gray-400' : 'text-gray-700 font-medium'}">${item.text}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                    <div class="grid grid-cols-2 gap-3 pt-4 border-t border-gray-50">
                        <button onclick="bulkStatus(${task.id}, true)" class="text-xs font-black py-3 rounded-ios bg-appleGreen/10 text-appleGreen uppercase">Concluir</button>
                        <button onclick="bulkStatus(${task.id}, false)" class="text-xs font-black py-3 rounded-ios bg-appleRed/10 text-appleRed uppercase">Resetar</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // --- DETALHADO LOGIC ---
        function populateYearSelector() {
            const yearSelect = document.getElementById('yearFilter');
            yearSelect.innerHTML = '';
            for (let y = 1991; y <= 2099; y++) {
                const opt = document.createElement('option');
                opt.value = y;
                opt.innerText = y;
                yearSelect.appendChild(opt);
            }
        }

        function openDetailModal() {
            populateYearSelector();
            const now = new Date();
            document.getElementById('monthFilter').value = String(now.getMonth() + 1).padStart(2, '0');
            document.getElementById('yearFilter').value = now.getFullYear();
            document.getElementById('detailModal').classList.remove('hidden');
            renderDetailList();
        }

        function closeDetailModal() { document.getElementById('detailModal').classList.add('hidden'); }

        function renderDetailList() {
            const container = document.getElementById('detailListContainer');
            const selectedMonth = document.getElementById('monthFilter').value;
            const selectedYear = document.getElementById('yearFilter').value;
            const monthsShort = ["JAN", "FEV", "MAR", "ABR", "MAI", "JUN", "JUL", "AGO", "SET", "OUT", "NOV", "DEZ"];
            document.getElementById('calIconMonth').innerText = monthsShort[parseInt(selectedMonth)-1];
            document.getElementById('calIconYear').innerText = selectedYear.toString().slice(-2);

            let filteredTasks = db.tasks.filter(t => {
                const parts = t.date.split('-');
                return parts[0] === selectedYear && parts[1] === selectedMonth;
            });

            filteredTasks.sort((a, b) => a.date.localeCompare(b.date));
            container.innerHTML = '';

            if(filteredTasks.length === 0) {
                container.innerHTML = `<div class="text-center p-10 text-gray-400 italic">Sem registros para este período.</div>`;
                return;
            }

            let lastDate = "";
            filteredTasks.forEach(task => {
                if(task.date !== lastDate) {
                    const dateObj = new Date(task.date + 'T12:00:00');
                    const dateHeader = document.createElement('div');
                    dateHeader.className = "text-xs font-bold text-appleBlue uppercase mt-4 mb-1 ml-1";
                    dateHeader.innerText = dateObj.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
                    container.appendChild(dateHeader);
                    lastDate = task.date;
                }

                const item = document.createElement('div');
                item.className = "bg-white p-4 rounded-ios shadow-sm flex justify-between items-center active:bg-gray-50 transition border-l-4 border-appleBlue/20";
                item.onclick = () => {
                    document.getElementById('dateSelector').value = task.date;
                    document.getElementById('dateSelector').dispatchEvent(new Event('change'));
                    closeDetailModal();
                };
                const doneCount = task.items.filter(i => i.done).length;
                item.innerHTML = `
                    <div>
                        <p class="font-bold text-gray-800">${task.title}</p>
                        <p class="text-[11px] text-gray-400 font-medium">${task.items.length} SUBTAREFAS • ${doneCount} CONCLUÍDAS</p>
                    </div>
                    <svg class="text-appleBlue/30" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="9 18 15 12 9 6"></polyline></svg>
                `;
                container.appendChild(item);
            });
        }

        // --- INICIALIZAÇÃO E AUXILIARES ---
        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('dateSelector').value = today;
            updateHeader(new Date());
            renderTasks(today);
        });

        function updateHeader(date) {
            if (isNaN(date.getTime())) return;
            document.getElementById('currentMonthDisplay').innerText = date.toLocaleDateString('pt-BR', { month: 'long' });
            document.getElementById('currentDayNumDisplay').innerText = date.toLocaleDateString('pt-BR', { day: 'numeric' });
            document.getElementById('currentDayNameDisplay').innerText = date.toLocaleDateString('pt-BR', { weekday: 'long' }).split('-')[0];
        }

        document.getElementById('dateSelector').onchange = (e) => {
            const val = e.target.value || new Date().toISOString().split('T')[0];
            updateHeader(new Date(val + 'T12:00:00'));
            renderTasks(val);
        };

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.toggle('opacity-0');
            document.getElementById('sidebarOverlay').classList.toggle('pointer-events-none');
        }

        function openAddModal() { document.getElementById('addModal').classList.remove('hidden'); }
        function closeAddModal() { document.getElementById('addModal').classList.add('hidden'); }
        
        function saveNewTask() {
            const title = document.getElementById('newTaskTitle').value;
            const items = document.getElementById('newTaskItems').value.split('\n').filter(i => i.trim() !== "");
            if(!title || items.length === 0) return;
            db.tasks.push({ id: Date.now(), date: document.getElementById('dateSelector').value, title, items: items.map(text => ({text, done: false})) });
            save(); closeAddModal();
            document.getElementById('newTaskTitle').value = ""; document.getElementById('newTaskItems').value = "";
        }

        function toggleItem(taskId, idx) {
            const t = db.tasks.find(x => x.id === taskId);
            t.items[idx].done = !t.items[idx].done; save();
        }

        function bulkStatus(id, s) { db.tasks.find(x => x.id === id).items.forEach(i => i.done = s); save(); }
        function deleteTask(id) { if(confirm('Excluir tarefa?')) { db.tasks = db.tasks.filter(x => x.id !== id); save(); } }
        function exportBackup() {
            const a = document.createElement('a');
            a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            a.download = "backup.json"; a.click();
        }
        function importBackup(e) {
            const reader = new FileReader();
            reader.onload = (ev) => { db = JSON.parse(ev.target.result); save(); toggleSidebar(); };
            reader.readAsText(e.target.files[0]);
        }
        function resetFactory() { if(confirm('Apagar tudo?')) { db = {tasks:[]}; save(); location.reload(); } }
    </script>
</body>
</html>
